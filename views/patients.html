<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Patients</title>

  <link rel="stylesheet"
        href="/css/style.css"/>
</head>
<body>

<div class="container">

  <h1>Patient Management</h1>

  <form id="patientForm">

    <input
      type="text"
      id="name"
      placeholder="Patient Name"
      required
    />

    <input
      type="number"
      id="age"
      placeholder="Age"
      required
    />

    <select id="gender">

      <option value="Male">
        Male
      </option>

      <option value="Female">
        Female
      </option>

    </select>

    <input
      type="text"
      id="phone"
      placeholder="Phone Number"
      required
    />

    <button type="submit">
      Add Patient
    </button>

  </form>

  <table>

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Phone</th>
      </tr>
    </thead>

    <tbody id="patientTable"></tbody>

  </table>

</div>

<script src="/js/patients.js"></script>

</body>
</html>
