<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Admin Login</title>

  <link rel="stylesheet"
        href="/css/style.css"/>
</head>
<body>

<div class="container">

  <h1>Admin Login</h1>

  <form id="loginForm">

    <input
      type="text"
      id="username"
      placeholder="Username"
      required
    />

    <input
      type="password"
      id="password"
      placeholder="Password"
      required
    />

    <button type="submit">
      Login
    </button>

  </form>

</div>

<script>

const loginForm =
  document.getElementById("loginForm");

loginForm.addEventListener(
  "submit",
  async (e) => {

    e.preventDefault();

    const loginData = {
      username:
        document.getElementById("username").value,

      password:
        document.getElementById("password").value,
    };

    const response = await fetch(
      "/auth/login",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json",
        },

        body: JSON.stringify(loginData),
      }
    );

    const data = await response.json();

    if (response.ok) {

      alert(data.message);

      window.location.href = "/";

    } else {

      alert(data.message);

    }
  }
);

</script>

</body>
</html>
