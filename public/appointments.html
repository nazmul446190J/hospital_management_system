<!DOCTYPE html>
<html>
<head>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Appointments</h1>

<table>

      <th>Phone</th>

      <th>Date</th>

    </tr>
  </thead>

  <tbody id="appointmentTable"></tbody>
</table>

<script src="js/appointments.js"></script>

</body>
</html>
